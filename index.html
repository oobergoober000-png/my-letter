<div id="login" class="stationery">
    <h3>For You</h3>

    <label for="password">Password</label>
    <input type="text" id="password" maxlength="10" placeholder="">

    <button onclick="checkPassword()">Unlock</button>

    <!-- Hint? link: underlined text, not a box -->
    <button
        onclick="showHint()"
        style="background:none; border:none; padding:0; margin-top:8px;
               text-decoration:underline; font-size:12px; color:#666; cursor:pointer;"
    >
        Hint?
    </button>

    <!-- Hint text: hidden initially -->
    <p id="hint-text" style="display:none;">
        Hint: The date we met (MM/DD/YYYY)
    </p>

    <!-- Hint image: hidden initially, small and inside the yellow box -->
    <img
        id="hint-image"
        src="hint-photo.jpeg"
        alt="Hint related to the date we met"
    >
</div>
